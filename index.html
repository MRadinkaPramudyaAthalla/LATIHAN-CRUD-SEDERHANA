<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Siswa</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 min-h-screen py-10 px-4">

  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="mb-8 text-center">
      <div class="inline-flex items-center gap-2 bg-blue-100 text-blue-600 text-xs font-bold px-4 py-1.5 rounded-full mb-3 uppercase tracking-widest">
        <i class="bi bi-mortarboard-fill"></i> Manajemen Siswa
      </div>
      <h1 class="text-4xl font-extrabold text-slate-800">Data Siswa</h1>
      <p class="text-slate-400 mt-2 text-sm">Tambah, edit, dan hapus data siswa dengan mudah</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-3xl shadow-lg shadow-blue-100 border border-blue-50 p-6 mb-5">
      <div class="flex items-center gap-2 mb-5">
        <div class="w-8 h-8 bg-blue-500 rounded-xl flex items-center justify-center">
          <i class="bi bi-person-plus-fill text-white text-sm"></i>
        </div>
        <h2 class="text-base font-bold text-slate-700">Input Data Siswa</h2>
      </div>

      <div class="flex flex-col gap-3">
        <div class="relative">
          <i class="bi bi-person absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-300"></i>
          <input type="text" id="inputNama"
            class="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-3 text-sm text-slate-700 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition bg-slate-50 focus:bg-white"
            placeholder="Nama siswa">
        </div>
        <div class="relative">
          <i class="bi bi-people absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-300"></i>
          <input type="text" id="inputRombel"
            class="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-3 text-sm text-slate-700 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition bg-slate-50 focus:bg-white"
            placeholder="Rombel / Kelas">
        </div>
        <div class="relative">
          <i class="bi bi-bar-chart absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-300"></i>
          <input type="number" id="inputNilai"
            class="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-3 text-sm text-slate-700 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition bg-slate-50 focus:bg-white"
            placeholder="Nilai (0–100)">
        </div>
        <button onclick="tambah()"
          class="w-full bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-600 hover:to-indigo-600 active:scale-95 text-white font-bold py-3 rounded-xl text-sm transition-all duration-150 shadow-md shadow-blue-200">
          <i class="bi bi-plus-lg mr-1"></i> Tambah Siswa
        </button>
      </div>
    </div>

    <!-- List Card -->
    <div class="bg-white rounded-3xl shadow-lg shadow-blue-100 border border-blue-50 p-6">
      <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-indigo-500 rounded-xl flex items-center justify-center">
            <i class="bi bi-list-ul text-white text-sm"></i>
          </div>
          <h2 class="text-base font-bold text-slate-700">Daftar Siswa</h2>
        </div>
        <span id="badgeTotal" class="bg-indigo-50 text-indigo-500 text-xs font-bold px-3 py-1 rounded-full">0 siswa</span>
      </div>
      <div id="output"></div>
    </div>

  </div>

<style>
  @keyframes fadeSlide {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .row-item { animation: fadeSlide 0.25s ease both; }
</style>

<script>
let data = []

function tambah(){
  let nama   = document.getElementById("inputNama").value
  let rombel = document.getElementById("inputRombel").value
  let nilai  = document.getElementById("inputNilai").value

  data.push({ nama, rombel, nilai })
  tampil()
}

function tampil(){
  let output = document.getElementById("output")
  document.getElementById("badgeTotal").textContent = data.length + " siswa"

  if(data.length === 0){
    output.innerHTML = `
      <div class="text-center py-10 text-slate-300">
        <i class="bi bi-inbox text-4xl block mb-2"></i>
        <p class="text-sm">Belum ada data siswa</p>
      </div>`
    return
  }

  let hasil = ""
  for(let i = 0; i < data.length; i++){
    let n = parseInt(data[i].nilai)
    let badge = n >= 90
      ? "bg-emerald-100 text-emerald-600"
      : n >= 75
      ? "bg-blue-100 text-blue-600"
      : n >= 60
      ? "bg-amber-100 text-amber-600"
      : "bg-red-100 text-red-500"

    hasil += `
      <div class="row-item flex items-center justify-between py-3.5 border-b border-slate-100 last:border-0 gap-3" style="animation-delay:${i*0.05}s">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-100 to-indigo-100 flex items-center justify-center shrink-0">
            <span class="text-xs font-bold text-indigo-400">${String(i+1).padStart(2,'0')}</span>
          </div>
          <div class="min-w-0">
            <p class="text-sm font-bold text-slate-700 truncate">${data[i].nama}</p>
            <p class="text-xs text-slate-400 mt-0.5"><i class="bi bi-people mr-1"></i>${data[i].rombel}</p>
          </div>
        </div>
        <span class="text-xs font-bold px-2.5 py-1 rounded-lg ${badge} shrink-0">${data[i].nilai}</span>
        <div class="flex gap-2 shrink-0">
          <button onclick="edit(${i})"
            class="text-xs bg-amber-50 text-amber-500 hover:bg-amber-100 border border-amber-200 px-3 py-1.5 rounded-lg font-semibold transition active:scale-95">
            <i class="bi bi-pencil"></i> Edit
          </button>
          <button onclick="hapus(${i})"
            class="text-xs bg-red-50 text-red-400 hover:bg-red-100 border border-red-200 px-3 py-1.5 rounded-lg font-semibold transition active:scale-95">
            <i class="bi bi-trash3"></i>
          </button>
        </div>
      </div>`
  }

  output.innerHTML = hasil
}

function hapus(i){
  data.splice(i, 1)
  tampil()
}

function edit(i){
  let namaBaru   = prompt("Edit Nama", data[i].nama)
  let rombelBaru = prompt("Edit Rombel", data[i].rombel)
  let nilaiBaru  = prompt("Edit Nilai", data[i].nilai)

  data[i].nama   = namaBaru
  data[i].rombel = rombelBaru
  data[i].nilai  = nilaiBaru

  tampil()
}

tampil()
</script>
</body>
</html>
